name: Node.js SDK Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'node/**'
      - '.github/workflows/node-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'node/**'
      - '.github/workflows/node-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'

jobs:
  test:
    name: Test Node.js SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Install dependencies
      run: moon run node:deps

    - name: Run linting
      run: moon run node:lint

    - name: Run tests with coverage
      run: moon run node:test

    - name: Build TypeScript
      run: moon run node:build

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: node-coverage
        path: node/coverage/
