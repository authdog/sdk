name: F# SDK

on:
  workflow_dispatch:
  # push:
  #   paths:
  #     - 'planned/fsharp/**'
  # pull_request:
  #   paths:
  #     - 'planned/fsharp/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore planned/fsharp/Authdog.Sdk.FSharp.fsproj
          dotnet restore planned/fsharp/tests/Authdog.Sdk.FSharp.Tests.fsproj
      - name: Build
        run: |
          dotnet build --no-restore -c Release planned/fsharp/Authdog.Sdk.FSharp.fsproj
          dotnet build --no-restore -c Release planned/fsharp/tests/Authdog.Sdk.FSharp.Tests.fsproj
      - name: Test
        run: dotnet test --no-build -c Release planned/fsharp/tests/Authdog.Sdk.FSharp.Tests.fsproj --logger trx
