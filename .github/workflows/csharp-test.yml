name: C# SDK Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'csharp/**'
      - '.github/workflows/csharp-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'csharp/**'
      - '.github/workflows/csharp-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  test:
    name: Test C# SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-dotnet: 'true'
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: moon run csharp:deps

    - name: Build solution
      run: moon run csharp:build

    - name: Run tests
      run: moon run csharp:test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: csharp-test-results
        path: csharp/TestResults/
        if-no-files-found: warn

  build:
    name: Build C# SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-dotnet: 'true'
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Build and package
      run: |
        moon run csharp:build
        moon run csharp:package

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: csharp-nuget-package
        path: csharp/nupkg/*.nupkg

  lint:
    name: Lint C# SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-dotnet: 'true'
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: moon run csharp:deps

    - name: Run dotnet-format check
      run: moon run csharp:lint

  coverage:
    name: Code Coverage C# SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-dotnet: 'true'
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Build solution
      run: |
        moon run csharp:deps
        moon run csharp:build

    - name: Run tests with coverage
      run: |
        cd csharp
        dotnet test Authdog.Sdk.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults --settings Tests/coverlet.runsettings

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        cd csharp
        reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"CoverageReport" -reporttypes:"Html;Cobertura"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: csharp-coverage-report
        path: csharp/CoverageReport/
        if-no-files-found: warn

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: csharp/CoverageReport/Cobertura.xml
        flags: csharp
        name: csharp-coverage
        fail_ci_if_error: false
