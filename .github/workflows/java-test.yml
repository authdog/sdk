name: Java SDK Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'java/**'
      - '.github/workflows/java-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'java/**'
      - '.github/workflows/java-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'

jobs:
  test:
    name: Test Java SDK
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: ["11", "17"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-java: 'true'
        java-version: ${{ matrix.java-version }}

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Install dependencies
      run: moon run java:deps

    - name: Run tests
      run: moon run java:test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: java-test-results-${{ matrix.java-version }}
        path: java/target/surefire-reports/

  build:
    name: Build Java SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-java: 'true'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build Java module
      run: moon run java:build

    - name: Package JAR
      run: moon run java:package

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: java-jar
        path: java/target/*.jar

  lint:
    name: Lint Java SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-java: 'true'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Run Checkstyle
      run: moon run java:lint

  benchmark:
    name: Benchmark Java SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon
      with:
        needs-java: 'true'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Run JMH benchmarks
      run: moon run java:benchmark

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: java-benchmark-results
        path: java/target/surefire-reports/
        if-no-files-found: warn
