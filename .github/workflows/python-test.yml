name: Python SDK Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'python/**'
      - '.github/workflows/python-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'python/**'
      - '.github/workflows/python-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'

jobs:
  test:
    name: Test Python SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Install dependencies
      run: moon run python:deps

    - name: Run linting
      run: moon run python:lint

    - name: Run tests
      run: moon run python:test

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: python-coverage
        path: python/coverage.xml
