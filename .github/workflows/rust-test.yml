name: Rust SDK Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Rust SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-stable-${{ hashFiles('rust/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-stable-

    - name: Check formatting
      run: moon run rust:fmt

    - name: Run clippy
      run: moon run rust:lint

    - name: Run tests
      run: moon run rust:test

    - name: Build documentation
      run: moon run rust:doc

  test-compat:
    name: Test Rust SDK (${{ matrix.rust-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust-version: ["beta", "nightly"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust ${{ matrix.rust-version }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust-version }}
        components: rustfmt, clippy

    - name: Regenerate Cargo.lock for compatibility
      run: |
        rm -f Cargo.lock
        cargo generate-lockfile
      working-directory: rust

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ matrix.rust-version }}-${{ hashFiles('rust/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ matrix.rust-version }}-

    - name: Check formatting
      run: |
        cd rust
        cargo fmt --all -- --check

    - name: Run clippy
      run: |
        cd rust
        cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      run: |
        cd rust
        cargo test --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: moon run rust:security

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Run tests with coverage
      run: |
        cd rust
        cargo tarpaulin --out Html --output-dir coverage

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-rust
        path: rust/coverage/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: rust/coverage/tarpaulin-report.html
        flags: rust
        name: rust-coverage
