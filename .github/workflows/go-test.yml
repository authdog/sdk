name: Go SDK Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'go/**'
      - '.github/workflows/go-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'go/**'
      - '.github/workflows/go-test.yml'
      - '.moon/workspace.yml'
      - '.moon/toolchain.yml'
      - '.prototools'

jobs:
  test:
    name: Test Go SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('go/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    - name: Install dependencies
      run: moon run go:deps

    - name: Run go vet
      run: moon run go:lint

    - name: Run go fmt check
      run: moon run go:fmt

    - name: Run tests with coverage
      run: moon run go:test

    - name: Generate coverage report
      run: |
        cd go
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: go-coverage
        path: go/coverage.*

  test-compat:
    name: Test Go SDK (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.20"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install dependencies
      run: |
        cd go
        go mod download

    - name: Run tests
      run: |
        cd go
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  build:
    name: Build Go SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Build Go module
      run: moon run go:build

  benchmark:
    name: Benchmark Go SDK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Moon + Proto
      uses: ./.github/actions/setup-moon

    - name: Run benchmarks
      run: moon run go:benchmark

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: go-benchmark-results
        path: go/benchmark.txt
        if-no-files-found: warn
