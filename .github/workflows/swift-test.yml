name: Swift Tests

on:
  workflow_dispatch:
  # push:
  #   paths:
  #     - 'planned/swift/**'
  #     - '.github/workflows/swift-test.yml'
  # pull_request:
  #   paths:
  #     - 'planned/swift/**'

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          cd planned/swift
          swift build

      - name: Run tests
        run: |
          cd planned/swift
          swift test
