language: 'javascript'

fileGroups:
  sources:
    - 'src/**/*'
  tests:
    - 'tests/**/*'
    - '**/*.test.*'
    - '**/*.spec.*'
  configs:
    - 'package.json'
    - 'pnpm-lock.yaml'
    - 'tsconfig.json'

tasks:
  deps:
    command: 'pnpm install --frozen-lockfile'
    inputs:
      - '@group(configs)'
    options:
      cache: false

  test:
    command: 'pnpm run test:coverage'
    deps:
      - '~:deps'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
    outputs:
      - 'coverage/'

  lint:
    command: 'pnpm run lint'
    deps:
      - '~:deps'
    inputs:
      - '@group(sources)'
      - '@group(configs)'

  build:
    command: 'pnpm run build'
    deps:
      - '~:deps'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'dist/'
